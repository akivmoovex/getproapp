name: CI

on:
  push:
    branches: [main, v2]
  pull_request:
    branches: [main, v2]

jobs:
  component-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Front-end production bundle (Vite)
        run: npm run build:assets

      - name: Stylelint (CSS + component boundaries)
        run: npm run lint:css

      - name: CSS boundary baseline (no new external overrides on .c-*)
        env:
          CI: true
        run: npm run lint:css-boundaries:ci

      - name: Enforce no legacy .btn in public templates
        env:
          CI: true
        run: npm run lint:components:enforce-btn

      - name: Component baseline check (new violations only)
        env:
          CI: true
        run: npm run lint:components:ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Visual regression (Playwright)
        env:
          CI: true
          ADMIN_PASSWORD: ci-playwright-admin-not-secret
        run: npm run test:ui
